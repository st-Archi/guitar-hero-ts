AWSTemplateFormatVersion: "2010-09-09"
Description: Infraestructura Guitar Hero TS - EC2 y S3

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Key Pair para SSH
  BucketName:
    Type: String
    Default: guitar-hero-ts-artifacts

Resources:
  GuitarHeroSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group Guitar Hero
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  GuitarHeroEC2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: ami-0c02fb55956c7d316
      KeyName: !Ref KeyPairName
      SecurityGroups:
        - !Ref GuitarHeroSG
      IamInstanceProfile: LabRole
      Tags:
        - Key: Name
          Value: guitar-hero-server

  GuitarHeroS3:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName

Outputs:
  PublicIP:
    Value: !GetAtt GuitarHeroEC2.PublicIp
  BucketName:
    Value: !Ref GuitarHeroS3
